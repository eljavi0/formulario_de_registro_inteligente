<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Taller: Formulario de Registro</title>
    <link rel="stylesheet" href="css/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Cargando los íconos de Font Awesome para el botón mostrar/ocultar contraseña -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="js/scripts.js" defer></script>
</head>

<body>
 <div class="contenedor-principal">
    <section id="registro">
    <form id="formulario-registro" novalidate>
        <h2>Crear tu cuenta</h2>

        <div class="datos-entrada">
            <label for="nombreusuario">Nombre de usuario</label>
            <input type="text" id="nombreusuario" name="nombreusuario" placeholder="Ej: dev_master" required minlength="4">
            <span class="mensaje-error">El nombre de usuario debe tener al menos 4 caracteres.</span>
        </div>

        <div class="datos-entrada">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required>
            <span class="mensaje-error">Ingresa un correo electrónico válido.</span>
        </div>

        <div class="datos-entrada">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" required placeholder="Mín. 8 caracteres, letras y números" pattern="(?=.{8,})(?=.*[A-Za-z])(?=.*\d).+">
            <span class="mensaje-error">La contraseña debe tener al menos 8 caracteres y contener letras y números.</span>
            <i id ="icono-contrasena" class="fa fa-eye-slash"></i>
            <div class="nivel-seguridad" id="nivelseguridad"></div>
        </div>

        <button type="submit" id="botonenviar">Registrarme</button>
    </form>
    </section>

            <section id="login" style="display:none">
                <form id="form-login" novalidate>
                    <h2>Iniciar sesión</h2>

                    <div class="datos-entrada">
                            <label for="login-usuario">Nombre de usuario</label>
                            <input type="text" id="login-usuario" required placeholder="tu_usuario">
                            <span class="mensaje-error" id="login-error" style="display:none"></span>
                    </div>

                    <div class="datos-entrada">
                            <label for="login-contrasena">Contraseña</label>
                            <input type="password" id="login-contrasena" required placeholder="Tu contraseña">
                            <i id="icono-contrasena-login" class="fa fa-eye-slash"></i>
                    </div>

                    <button type="submit" id="boton-login">Entrar</button>
                </form>
            </section>
     </div>   
</body>

</html>
